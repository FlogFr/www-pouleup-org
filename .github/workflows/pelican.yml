name: Build and Deploy Pelican Site

on:
  push:
    branches:
      - main  # Branche source à surveiller

permissions:
  contents: write  # nécessaire pour push vers gh-pages

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout du repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2) Installer Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3) Installer Pelican + dépendances
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pelican markdown

      # 4) Build du site Pelican
      - name: Build site
        run: pelican content -o output -s pelicanconf.py

      # 4.5) Ajouter le fichier CNAME
      - name: Add CNAME for custom domain
        run: echo "pouleup.org" > output/CNAME

      # 5) Deployment sur gh-pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
