name: Build and Deploy Pelican Site

on:
  push:
    branches:
      - main  # ou la branche source de ton contenu

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'  # adapte selon ton besoin

      # 3. Install Pelican and dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pelican markdown

      # 4. Build the Pelican site
      - name: Build site
        run: pelican content -o output -s pelicanconf.py

      # 5. Deploy to gh-pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
